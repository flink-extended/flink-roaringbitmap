name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.number || github.run_id }}
  cancel-in-progress: true

jobs:
  license-check:
    name: Check License Header
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Apache License Header
        run: |
          MISSING=()
          while IFS= read -r file; do
            if ! head -3 "$file" | grep -q "Licensed to the Apache Software Foundation"; then
              MISSING+=("$file")
            fi
          done < <(find src/ -name '*.java' -type f)

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::The following files are missing the Apache License header:"
            printf '  %s\n' "${MISSING[@]}"
            exit 1
          fi
          echo "All Java files have the Apache License header."

  compile-java8:
    name: Compile (JDK 8)
    runs-on: ubuntu-latest
    needs: license-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn clean compile -B --no-transfer-progress

  test-java11:
    name: Unit Tests (JDK 11)
    runs-on: ubuntu-latest
    needs: compile-java8
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: temurin
          cache: maven

      - name: Build and Test
        run: mvn clean verify -B --no-transfer-progress
