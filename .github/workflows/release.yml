name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: temurin
          cache: maven

      - name: Build, Test and Package
        run: mvn clean verify -B --no-transfer-progress

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Rename JAR for release
        run: |
          SHADED_JAR=$(ls target/flink-roaringbitmap-*.jar | grep -v original | head -1)
          cp "$SHADED_JAR" "target/flink-roaringbitmap-${{ steps.version.outputs.VERSION }}.jar"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: target/flink-roaringbitmap-${{ steps.version.outputs.VERSION }}.jar
